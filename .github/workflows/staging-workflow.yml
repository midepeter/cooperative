name: Staging Workflow
on:
  push:
    branches: ["*"]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  staging-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint || echo "Linting failed but continuing..."

      - name: Build
        run: npm run build

      # - name: Upload build artifacts
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: dist
      #     path: dist/

  staging-deploy:
    needs: staging-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ secrets.APP_NAME  }}
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY  }}
      GIT_HUB_ACCESS_TOKEN: ${{ secrets.GITHUB_ACCESS_TOKEN  }}
      GITHUB_USERNAME: ${{ secrets.GIT_HUB_USERNAME  }}
    steps:
      - name: checkout
        uses: actions/checkout@v3.3.0

      # - name: Download build artifacts
      #   uses: actions/download-artifact@v3
      #   with:
      #     name: dist
      #     path: dist/

      - name: login to heroku's docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY  }}
          username: ${{ secrets.DOCKER_USERNAME  }}
          password: ${{ secrets.DOCKER_PASSWORD  }}

      - name: view docker registry
        run: echo "Logged in to ${{ env.DOCKER_REGISTRY }}"

      - name: build and push the docker image here
        run: |
          chmod +x ./.github/shell/docker-push.sh
          ./.github/shell/docker-push.sh
